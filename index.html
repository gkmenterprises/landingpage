<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GKM Container Solutions — Buy, Sell & Convert Containers in Chennai</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── PALETTE extracted from logo
   Navy    : #0E2266  (dark navy blue)
   Orange  : #F47920  (orange)
   Orange2 : #F5A623  (gold/yellow-orange)
   Green   : #2E7D32  (Buy. green — accent)
   White   : #FFFFFF
   BG      : #F5F7FA
   Gray    : #6B7280
   Border  : #E2E8F0
──────────────────────────────── */
:root{
  --navy:   #0E2266;
  --navy2:  #1A3070;
  --or:     #F47920;
  --or2:    #F5A623;
  --green:  #2E7D32;
  --white:  #FFFFFF;
  --bg:     #FFFFFF;
  --bg2:    #F5F7FA;
  --text:   #0E2266;
  --gray:   #6B7280;
  --border: #E2E8F0;
  --shadow: 0 4px 24px rgba(14,34,102,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}

/* ── NAV ─────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;height:70px;
  background:rgba(14,34,102,0.92);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  transition:background 0.3s;
}
nav.scrolled{background:rgba(14,34,102,0.99);}
.nav-logo{
  display:flex;align-items:center;gap:10px;
}
.nav-logo img{
  height:46px;width:auto;
  filter:brightness(0) invert(1);
  object-fit:contain;
}
.nav-logo-text{
  font-family:'Syne',sans-serif;font-size:15px;font-weight:800;
  color:#fff;line-height:1.15;letter-spacing:0.2px;
}
.nav-logo-text span{
  display:block;font-size:10px;font-weight:500;
  color:rgba(255,255,255,0.55);letter-spacing:1px;text-transform:uppercase;
}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
.nav-links a{
  color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;
  transition:color 0.2s;position:relative;padding-bottom:2px;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:var(--or);transform:scaleX(0);transform-origin:left;
  transition:transform 0.25s;
}
.nav-links a:hover{color:#fff;}
.nav-links a:hover::after{transform:scaleX(1);}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-phone{color:rgba(255,255,255,0.85);font-size:13px;font-weight:600;}
.btn-nav{
  background:var(--or);color:#fff;
  padding:9px 22px;border-radius:6px;
  font-size:13px;font-weight:700;font-family:'Syne',sans-serif;
  transition:all 0.2s;
}
.btn-nav:hover{background:var(--or2);transform:translateY(-1px);}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:5px;}
.hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;}
.mob-menu{
  display:none;position:fixed;top:70px;left:0;right:0;
  background:var(--navy);z-index:99;
  padding:18px 5% 24px;
  border-top:1px solid rgba(255,255,255,0.08);
  flex-direction:column;gap:2px;
}
.mob-menu a{color:rgba(255,255,255,0.82);padding:12px 0;font-size:15px;border-bottom:1px solid rgba(255,255,255,0.07);display:block;}
.mob-menu.open{display:flex;}
.mob-btns{margin-top:14px;display:flex;gap:10px;}

/* ── HERO ─────────────────────────────── */
.hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1494412574643-ff11b0a5c1c3?w=1600&q=80') center/cover no-repeat;
}
.hero-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(
    110deg,
    rgba(14,34,102,0.85) 0%,
    rgba(14,34,102,0.60) 55%,
    rgba(14,34,102,0.25) 100%
  );
}
.hero-content{
  position:relative;z-index:2;
  padding:140px 5% 100px;
  max-width:680px;
}
.hero-loc{
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);
  letter-spacing:0.5px;margin-bottom:18px;
  display:flex;align-items:center;gap:6px;
}
.hero h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(36px,5.2vw,66px);
  font-weight:800;color:#fff;
  line-height:1.06;letter-spacing:-1.5px;
  margin-bottom:18px;
}
.hero h1 .orange{color:var(--or);}
.hero-sub{
  color:rgba(255,255,255,0.65);font-size:16px;
  max-width:480px;margin-bottom:36px;line-height:1.75;
}
.hero-tagline{
  display:flex;align-items:center;gap:10px;
  margin-bottom:36px;font-size:16px;font-weight:600;
}
.hero-tagline .buy{color:#66BB6A;}
.hero-tagline .sell{color:#64B5F6;}
.hero-tagline .convert{color:var(--or2);}
.hero-tagline .div{color:rgba(255,255,255,0.3);}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;}
.btn-primary{
  background:var(--or);color:#fff;
  padding:14px 30px;border-radius:50px;
  font-weight:700;font-size:15px;font-family:'Syne',sans-serif;
  transition:all 0.22s;display:inline-flex;align-items:center;gap:8px;
}
.btn-primary:hover{background:var(--or2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(244,121,32,0.4);}
.btn-ghost{
  background:rgba(255,255,255,0.12);color:#fff;
  padding:14px 28px;border-radius:50px;
  border:1.5px solid rgba(255,255,255,0.35);
  font-weight:600;font-size:15px;
  backdrop-filter:blur(6px);
  transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;
}
.btn-ghost:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.6);}

/* Stats card */
.hero-stats-card{
  position:absolute;bottom:40px;right:5%;z-index:2;
  background:#fff;border-radius:16px;
  padding:22px 28px;
  display:flex;align-items:center;gap:28px;
  box-shadow:0 8px 40px rgba(0,0,0,0.18);
}
.hsc-item{text-align:center;}
.hsc-icon{font-size:24px;margin-bottom:4px;}
.hsc-label{font-size:12px;color:var(--gray);font-weight:500;}
.hsc-div{width:1px;height:44px;background:var(--border);}
.hsc-big{text-align:center;}
.hsc-num{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--navy);line-height:1;}
.hsc-sub{font-size:12px;color:var(--gray);margin-top:3px;}

/* ── MARQUEE ──────────────────────────── */
.mstrip{background:var(--or);padding:12px 0;overflow:hidden;white-space:nowrap;}
.minner{display:inline-block;animation:mscroll 22s linear infinite;}
@keyframes mscroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.minner span{
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  color:rgba(255,255,255,0.92);letter-spacing:1.5px;text-transform:uppercase;padding:0 28px;
}
.minner span::before{content:'◆';margin-right:28px;opacity:0.5;}

/* ── SECTIONS ─────────────────────────── */
.sec{padding:86px 5%;}
.sec-gray{background:var(--bg2);}
.sec-navy{background:var(--navy);}
.lbl{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:10px;}
.stitle{font-family:'Syne',sans-serif;font-size:clamp(26px,3vw,40px);font-weight:800;color:var(--navy);line-height:1.12;letter-spacing:-0.5px;}
.stitle .hl{color:var(--or);}
.ssub{color:var(--gray);font-size:15px;max-width:520px;margin-top:12px;line-height:1.75;}
.sh{margin-bottom:50px;}
.sh.c{text-align:center;}
.sh.c .ssub{margin:12px auto 0;}

/* ── ABOUT STRIP ──────────────────────── */
.about-strip{
  background:var(--bg2);padding:48px 5%;
  display:grid;grid-template-columns:1fr 2fr;
  gap:60px;align-items:center;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.as-left{
  font-family:'Syne',sans-serif;
  font-size:clamp(18px,2.2vw,26px);
  font-weight:800;color:var(--navy);line-height:1.3;
}
.as-left span{color:var(--or);}
.as-left .sub{
  display:block;margin-top:10px;
  font-size:13px;font-weight:400;color:var(--gray);
  font-family:'DM Sans',sans-serif;line-height:1.6;
}
.as-right{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.as-stat{text-align:center;}
.as-num{
  font-family:'Syne',sans-serif;font-size:32px;font-weight:800;
  color:var(--navy);line-height:1;
}
.as-num .or{color:var(--or);}
.as-label{font-size:13px;color:var(--gray);margin-top:5px;line-height:1.4;}
.as-bar{width:28px;height:3px;background:var(--or);border-radius:2px;margin:8px auto 0;}

/* ── SERVICES ─────────────────────────── */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.sc{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:26px 20px;
  transition:all 0.25s;position:relative;overflow:hidden;
}
.sc::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--navy),var(--or));
  transform:scaleX(0);transform-origin:left;transition:transform 0.3s;
}
.sc:hover{transform:translateY(-5px);box-shadow:var(--shadow);border-color:rgba(244,121,32,0.3);}
.sc:hover::after{transform:scaleX(1);}
.sc-ico{
  font-size:26px;width:50px;height:50px;
  background:rgba(244,121,32,0.1);border-radius:12px;
  display:flex;align-items:center;justify-content:center;margin-bottom:14px;
}
.sc-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.sc-d{font-size:13px;color:var(--gray);line-height:1.65;}

/* ── HOW IT WORKS ─────────────────────── */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
.steps::before{
  content:'';position:absolute;top:32px;left:12%;right:12%;height:1px;
  background:rgba(244,121,32,0.25);
}
.step{text-align:center;padding:0 14px;position:relative;z-index:1;}
.snum{
  width:64px;height:64px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(244,121,32,0.35);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--or);
  transition:all 0.25s;
}
.step:hover .snum{background:var(--or);color:#fff;border-color:var(--or);box-shadow:0 0 20px rgba(244,121,32,0.45);}
.step-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff;margin-bottom:8px;}
.step-d{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.65;}

/* ── PRODUCTS ─────────────────────────── */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.pc{
  background:var(--bg);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;transition:all 0.25s;
}
.pc:hover{transform:translateY(-5px);box-shadow:0 16px 48px rgba(14,34,102,0.12);}
.pc-img{height:175px;display:flex;align-items:center;justify-content:center;font-size:58px;}
.pc-body{padding:20px;}
.pc-badge{
  display:inline-block;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--or);background:rgba(244,121,32,0.1);
  padding:3px 10px;border-radius:4px;margin-bottom:9px;
}
.pc-t{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--navy);margin-bottom:7px;}
.pc-d{font-size:13px;color:var(--gray);margin-bottom:14px;line-height:1.65;}
.pc-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--or);transition:gap 0.2s;}
.pc-link:hover{gap:9px;}

/* ── WHY US ───────────────────────────── */
.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.wlist{display:flex;flex-direction:column;gap:14px;}
.wi{
  display:flex;gap:15px;align-items:flex-start;
  padding:18px;border-radius:12px;
  background:var(--bg2);border:1px solid var(--border);transition:all 0.22s;
}
.wi:hover{border-color:rgba(244,121,32,0.35);box-shadow:0 6px 20px rgba(244,121,32,0.08);}
.wi-ico{
  font-size:20px;width:44px;height:44px;flex-shrink:0;
  background:rgba(244,121,32,0.1);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.wi-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.wi-d{font-size:13px;color:var(--gray);line-height:1.65;}
.wv{
  background:var(--navy);border-radius:20px;padding:38px;
  position:relative;overflow:hidden;
}
.wv::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--or),var(--or2),transparent);}
.wv::after{content:'';position:absolute;bottom:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(244,121,32,0.07);}
.wv-logo{margin-bottom:20px;}
.wv-logo img{height:52px;filter:brightness(0) invert(1);object-fit:contain;}
.wv-t{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:6px;}
.wv-t span{color:var(--or);}
.wv-s{font-size:13px;color:rgba(255,255,255,0.42);margin-bottom:24px;}
.wvc{display:flex;align-items:center;gap:13px;margin-bottom:13px;}
.wvc-ico{width:38px;height:38px;border-radius:8px;flex-shrink:0;background:rgba(244,121,32,0.13);display:flex;align-items:center;justify-content:center;font-size:16px;}
.wvc-lbl{font-size:10px;color:rgba(255,255,255,0.38);letter-spacing:1px;text-transform:uppercase;}
.wvc-val{font-size:14px;font-weight:600;color:#fff;}
.wvc-val a{color:#fff;}
.wvb{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:8px;font-weight:700;font-size:14px;font-family:'Syne',sans-serif;transition:all 0.2s;margin-top:10px;}
.wvb.or{background:var(--or);color:#fff;}
.wvb.or:hover{background:var(--or2);}
.wvb.out{background:rgba(255,255,255,0.07);color:#fff;border:1.5px solid rgba(255,255,255,0.15);}
.wvb.out:hover{background:rgba(255,255,255,0.12);}

/* ── FORM ─────────────────────────────── */
.form-sec{background:var(--bg2);padding:86px 5%;border-top:1px solid var(--border);}
.form-wrap{
  max-width:950px;margin:0 auto;
  background:var(--bg);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
  display:grid;grid-template-columns:1fr 1.5fr;
  box-shadow:0 20px 60px rgba(14,34,102,0.10);
}
.fl{
  background:var(--navy);padding:40px 28px;
  display:flex;flex-direction:column;justify-content:space-between;
  position:relative;overflow:hidden;
}
.fl::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--or),var(--or2));}
.fl::after{content:'';position:absolute;bottom:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(244,121,32,0.08);}
.fl-logo{margin-bottom:20px;}
.fl-logo img{height:48px;filter:brightness(0) invert(1);object-fit:contain;}
.fl-t{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:8px;}
.fl-t span{color:var(--or);}
.fl-s{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:26px;line-height:1.65;}
.fl-ci{display:flex;flex-direction:column;gap:13px;}
.fl-c{display:flex;align-items:center;gap:11px;font-size:13px;color:rgba(255,255,255,0.65);}
.fl-ico{width:34px;height:34px;border-radius:8px;flex-shrink:0;background:rgba(244,121,32,0.14);display:flex;align-items:center;justify-content:center;font-size:14px;}
.fl-c a{color:#fff;font-weight:600;}
.fl-bot{margin-top:26px;font-size:11px;color:rgba(255,255,255,0.25);line-height:1.7;}
.fr{padding:36px 34px;}
.fr-t{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--navy);margin-bottom:4px;}
.fr-s{font-size:13px;color:var(--gray);margin-bottom:22px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--navy);opacity:0.7;margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 13px;
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:8px;font-size:14px;
  font-family:'DM Sans',sans-serif;color:var(--text);
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--or);box-shadow:0 0 0 3px rgba(244,121,32,0.12);background:#fff;
}
.field textarea{resize:vertical;min-height:88px;}
.sub-btn{
  width:100%;padding:13px;background:var(--navy);color:#fff;
  border:none;border-radius:8px;
  font-size:15px;font-weight:700;font-family:'Syne',sans-serif;
  letter-spacing:0.5px;cursor:pointer;
  transition:all 0.22s;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;
}
.sub-btn:hover{background:var(--or);transform:translateY(-1px);box-shadow:0 8px 24px rgba(244,121,32,0.3);}
.sub-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
.smsg{display:none;text-align:center;padding:11px;border-radius:8px;font-size:13px;font-weight:600;margin-top:10px;}
.smsg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
.smsg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── BLOG PREVIEW SECTION ─────────────────────────────── */
.blog-preview{
  background:var(--bg);
  padding:86px 5%;
}
.blog-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;
  margin-top:40px;
}
.blog-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  transition:all 0.25s;
}
.blog-card:hover{
  transform:translateY(-5px);
  box-shadow:var(--shadow);
}
.blog-img{
  height:200px;
  background:linear-gradient(135deg,#0E2266,#1A3070);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
}
.blog-content{
  padding:22px;
}
.blog-date{
  font-size:11px;
  color:var(--or);
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:8px;
}
.blog-title{
  font-family:'Syne',sans-serif;
  font-size:18px;
  font-weight:700;
  color:var(--navy);
  margin-bottom:10px;
  line-height:1.4;
}
.blog-excerpt{
  font-size:13px;
  color:var(--gray);
  line-height:1.65;
  margin-bottom:16px;
}
.blog-link{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  font-weight:700;
  color:var(--or);
  transition:gap 0.2s;
}
.blog-link:hover{gap:10px;}

/* ── FOOTER ───────────────────────────── */
footer{background:var(--navy);padding:52px 5% 24px;}
.fg{display:grid;grid-template-columns:1.7fr 1fr 1fr 1fr;gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:22px;}
